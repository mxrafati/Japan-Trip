<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Japan Trip Planner</title>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#1a1a1a;--ink2:#4a4a4a;--ink3:#888;--paper:#faf8f4;--paper2:#f2ede5;--paper3:#e8e0d4;
  --red:#c0392b;--red-light:#fdf0ef;--teal:#1a7a5e;--teal-light:#eaf4f0;
  --gold:#b8860b;--gold-light:#fdf8ec;--purple:#5b4a8a;--purple-light:#f0edf8;
  --border:rgba(26,26,26,0.12);--border2:rgba(26,26,26,0.07);
  --font-display:'Shippori Mincho',serif;--font-body:'DM Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:15px;overflow-x:hidden}
#app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto}
.app-header{background:var(--ink);color:var(--paper);padding:16px 20px 14px;flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.app-header h1{font-family:var(--font-display);font-size:19px;font-weight:500}
.app-header .subtitle{font-size:11px;opacity:.5;margin-top:1px;font-weight:300}
.save-badge{font-size:11px;background:var(--teal);color:white;padding:3px 9px;border-radius:20px;opacity:0;transition:opacity .4s}
.save-badge.show{opacity:1}
.bottom-nav{flex-shrink:0;background:var(--ink);display:flex;border-top:1px solid rgba(255,255,255,.08);padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:12px 8px 10px;background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);font-family:var(--font-body);font-size:11px;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
.nav-btn.active{color:#fff}
.nav-btn svg{width:20px;height:20px}
.tab-content{flex:1;overflow-y:auto;min-height:0}
.tab-content.map-tab{overflow:hidden;display:flex;flex-direction:column}
.padded{padding:16px}

/* CITY LEGEND */
.city-legend{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
.legend-chip{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--ink2)}
.legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* DAY CARD */
.day-card{background:#fff;border:1px solid var(--border);border-radius:16px;margin-bottom:12px;overflow:hidden}
.day-card-header{padding:11px 14px 10px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border2)}
.day-num{font-family:var(--font-display);font-size:13px;font-weight:600;color:var(--ink3);width:24px;text-align:center;flex-shrink:0}
.day-city-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.day-city-label{font-size:13px;font-weight:500;flex:1}
.day-date{font-size:11px;color:var(--ink3)}
.day-add-btn{width:26px;height:26px;border-radius:50%;background:var(--paper2);border:none;cursor:pointer;font-size:18px;color:var(--ink2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.day-card-body{padding:10px 12px}
.hours-row{display:flex;align-items:center;gap:8px;margin-top:8px}
.hours-track{flex:1;height:3px;background:var(--paper3);border-radius:2px;overflow:hidden}
.hours-fill{height:100%;border-radius:2px;background:var(--teal);transition:width .3s}
.hours-text{font-size:11px;color:var(--ink3);white-space:nowrap}
.tl-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:4px}
.tl-spine{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0;padding-top:5px}
.tl-dot-outer{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.tl-connector{width:1.5px;flex:1;min-height:8px;margin-top:3px}
.tl-chip-area{flex:1;min-width:0;padding-bottom:3px}
.activity-chip{display:flex;align-items:center;gap:6px;padding:6px 10px;border-radius:22px;cursor:pointer;width:100%;border:1px solid transparent;transition:opacity .15s}
.activity-chip:active{opacity:.75}
.chip-name{flex:1;font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.chip-dur{font-size:11px;opacity:.65;white-space:nowrap;flex-shrink:0}
.chip-actions{display:flex;align-items:center;gap:4px;flex-shrink:0}
.chip-map-btn{font-size:10px;padding:2px 6px;border-radius:10px;background:rgba(255,255,255,.6);border:1px solid rgba(0,0,0,.12);cursor:pointer;color:inherit;text-decoration:none;white-space:nowrap;display:inline-flex;align-items:center;gap:3px;font-family:var(--font-body)}
.chip-remove{background:none;border:none;cursor:pointer;opacity:.4;font-size:16px;line-height:1;color:inherit;padding:0 2px;flex-shrink:0}
.transit-row{display:flex;gap:10px;align-items:stretch;margin-bottom:4px}
.transit-spine{display:flex;flex-direction:column;align-items:center;width:14px;flex-shrink:0}
.transit-line{width:1.5px;flex:1;background:var(--paper3)}
.transit-btn{font-size:11px;color:var(--ink3);background:var(--paper2);border:1px dashed var(--border);border-radius:10px;padding:3px 9px;cursor:pointer;font-family:var(--font-body);white-space:nowrap;margin:1px 0}
.day-empty{font-size:13px;color:var(--ink3);padding:4px 2px;font-style:italic}
.section-title{font-family:var(--font-display);font-size:14px;font-weight:600;color:var(--ink2);margin-bottom:10px;padding-top:4px;display:flex;align-items:center;gap:8px}
.count-badge{font-family:var(--font-body);font-size:11px;font-weight:400;background:var(--paper3);color:var(--ink2);padding:2px 7px;border-radius:10px}
.unsched-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.unsched-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.unsched-name{flex:1;font-size:13px;font-weight:500;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.unsched-dur{font-size:12px;color:var(--ink3);white-space:nowrap}
.unsched-badge{font-size:10px;padding:2px 6px;border-radius:8px;white-space:nowrap;flex-shrink:0}
.assign-btn{font-size:11px;padding:4px 10px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;color:var(--ink2);font-family:var(--font-body);white-space:nowrap}
.add-spot-btn{width:100%;padding:12px;font-size:13px;color:var(--teal);border:1.5px dashed var(--border);border-radius:10px;background:none;cursor:pointer;font-family:var(--font-body);margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:6px}
.add-spot-btn:hover{background:var(--teal-light)}
.spots-city-group{margin-bottom:20px}
.spots-city-title{font-size:11px;font-weight:500;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.spot-list-item{background:#fff;border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:6px;display:flex;align-items:center;gap:8px}
.spot-list-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.spot-list-info{flex:1;min-width:0}
.spot-list-name{font-size:13px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spot-list-sub{font-size:11px;color:var(--ink3);margin-top:1px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.spot-list-right{display:flex;align-items:center;gap:5px;flex-shrink:0}
.edit-btn{font-size:11px;padding:3px 8px;border:1px solid var(--border);border-radius:8px;background:none;cursor:pointer;color:var(--ink2);font-family:var(--font-body)}
.chip-tokyo{background:#eaf4f0;border-color:#c4e3d9}.chip-tokyo .chip-name,.chip-tokyo .chip-dur{color:#0f4a38}
.chip-kyoto{background:#f0edf8;border-color:#d8d0ee}.chip-kyoto .chip-name,.chip-kyoto .chip-dur{color:#3c2e6e}
.chip-hiroshima{background:#fdf0ef;border-color:#f5c8c4}.chip-hiroshima .chip-name,.chip-hiroshima .chip-dur{color:#7a2318}
.chip-osaka{background:#fdf8ec;border-color:#f0dead}.chip-osaka .chip-name,.chip-osaka .chip-dur{color:#6b4a08}
.badge-booked{background:var(--purple-light);color:var(--purple)}
.badge-flex{background:var(--teal-light);color:var(--teal)}
.badge-fixed{background:var(--red-light);color:var(--red)}

/* ── MAP TAB ── */
.map-tab-inner{display:flex;flex-direction:column;height:100%}
.map-filter-bar{display:flex;gap:6px;padding:10px 14px;overflow-x:auto;scrollbar-width:none;background:#fff;border-bottom:1px solid var(--border2);flex-shrink:0}
.map-filter-bar::-webkit-scrollbar{display:none}
.filter-chip{padding:5px 12px;border-radius:20px;font-size:12px;font-family:var(--font-body);border:1.5px solid var(--border);background:none;cursor:pointer;color:var(--ink2);white-space:nowrap;display:flex;align-items:center;gap:5px;flex-shrink:0;transition:all .15s}
.filter-chip.active{border-color:transparent;color:#fff}
.fc-dot{width:7px;height:7px;border-radius:50%}

/* map iframe */
#map-iframe{width:100%;border:none;flex-shrink:0;transition:height .2s}

/* spot cards list */
.map-spot-list{flex:1;overflow-y:auto;background:var(--paper)}
.map-spot-card{display:flex;gap:0;background:#fff;border-bottom:1px solid var(--border2);cursor:pointer;transition:background .12s;position:relative}
.map-spot-card:active,.map-spot-card.active{background:#f0f0ec}
.map-spot-card-img{width:80px;height:80px;object-fit:cover;flex-shrink:0;background:var(--paper3)}
.map-spot-card-img-placeholder{width:80px;height:80px;flex-shrink:0;background:var(--paper3);display:flex;align-items:center;justify-content:center;font-size:22px}
.map-spot-card-body{flex:1;padding:10px 12px;min-width:0;display:flex;flex-direction:column;justify-content:center;gap:3px}
.msc-name{font-size:13px;font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.msc-city-row{display:flex;align-items:center;gap:5px}
.msc-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.msc-city{font-size:11px;color:var(--ink3)}
.msc-day{font-size:11px;font-weight:500}
.msc-rating{display:flex;align-items:center;gap:3px;font-size:11px;color:var(--ink3)}
.msc-stars{color:#f0a500;letter-spacing:-1px;font-size:12px}
.map-spot-card-arrow{position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:16px;color:var(--ink3);opacity:.4}

/* modal */
.modal-overlay{position:fixed;inset:0;background:rgba(26,26,26,.5);z-index:200;display:flex;align-items:flex-end;animation:fadeIn .15s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.modal-sheet{background:var(--paper);width:100%;max-height:92vh;overflow-y:auto;border-radius:20px 20px 0 0;padding:0 0 env(safe-area-inset-bottom);animation:slideUp .22s ease}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-handle{width:36px;height:4px;background:var(--paper3);border-radius:2px;margin:12px auto 0}
.modal-header{padding:16px 20px 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border2)}
.modal-title{font-family:var(--font-display);font-size:17px;font-weight:500}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--paper3);border:none;cursor:pointer;font-size:16px;color:var(--ink2);display:flex;align-items:center;justify-content:center}
.modal-body{padding:16px 20px}
.form-group{margin-bottom:14px}
.form-label{font-size:12px;font-weight:500;color:var(--ink2);display:block;margin-bottom:5px;text-transform:uppercase;letter-spacing:.05em}
.form-input,.form-select{width:100%;padding:11px 14px;font-size:15px;font-family:var(--font-body);background:#fff;border:1px solid var(--border);border-radius:10px;color:var(--ink);-webkit-appearance:none}
.form-input:focus,.form-select:focus{outline:none;border-color:var(--teal)}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;padding:12px 20px 20px}
.btn-primary{flex:1;padding:13px;font-size:15px;font-family:var(--font-body);background:var(--ink);color:white;border:none;border-radius:10px;cursor:pointer;font-weight:500}
.btn-secondary{flex:1;padding:13px;font-size:15px;font-family:var(--font-body);background:none;color:var(--ink2);border:1px solid var(--border);border-radius:10px;cursor:pointer}
.btn-danger{flex:1;padding:13px;font-size:15px;font-family:var(--font-body);background:none;color:var(--red);border:1px solid rgba(192,57,43,.25);border-radius:10px;cursor:pointer}
.move-day-item{padding:12px 14px;border-bottom:1px solid var(--border2);cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.move-day-item:hover{background:var(--paper2)}
.move-day-item:last-child{border-bottom:none}
.move-day-name{font-size:14px;font-weight:500;flex:1}
.move-day-meta{font-size:11px;color:var(--ink3)}
.transit-hint{font-size:12px;color:var(--ink3);margin-bottom:12px;line-height:1.5}
.transit-presets{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.preset-btn{padding:5px 12px;border-radius:20px;font-size:12px;font-family:var(--font-body);background:var(--paper2);border:1px solid var(--border);cursor:pointer;color:var(--ink2)}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--paper3);border-radius:2px}
</style>
</head>

let state={spots:[],transit:{},nextId:20,activeTab:'calendar',modal:null,moveId:null,transitEdit:null,form:{},mapFilter:'all',activeSpotId:null};

function loadState(){
  try{const s=localStorage.getItem('japan-trip-v3');if(s){const p=JSON.parse(s);state.spots=p.spots||DEFAULT_SPOTS;state.transit=p.transit||{};state.nextId=p.nextId||20;}else{state.spots=JSON.parse(JSON.stringify(DEFAULT_SPOTS));}}
  catch(e){state.spots=JSON.parse(JSON.stringify(DEFAULT_SPOTS));}
}
let saveTimer=null;
function saveState(){
  clearTimeout(saveTimer);
  saveTimer=setTimeout(()=>{
    localStorage.setItem('japan-trip-v3',JSON.stringify({spots:state.spots,transit:state.transit,nextId:state.nextId}));
    const b=document.getElementById('save-badge');if(b){b.classList.add('show');setTimeout(()=>b.classList.remove('show'),1500);}
  },300);
}
function getDaySpots(i){return state.spots.filter(s=>s.day===i).sort((a,b)=>a.order-b.order)}
function getTransitMins(fc,tc,key){if(state.transit[key]!==undefined)return state.transit[key];return(TRANSIT_DEF[fc]&&TRANSIT_DEF[fc][tc])?TRANSIT_DEF[fc][tc]:30}
function transitKey(a,b){return`${a.id}->${b.id}`}
function transitLabel(m){return m<60?`${m} min transit`:`${Math.floor(m/60)}h${m%60>0?' '+m%60+'min':''} transit`}
function getDayTotal(i){const ss=getDaySpots(i);let h=ss.reduce((a,s)=>a+s.duration,0);for(let j=0;j<ss.length-1;j++)h+=getTransitMins(ss[j].city,ss[j+1].city,transitKey(ss[j],ss[j+1]))/60;return Math.round(h*10)/10}
function typeLabel(t){return t==='booked'?'Pre-booked':t==='fixed'?'Fixed time':'Flexible'}
function badgeClass(t){return t==='booked'?'badge-booked':t==='fixed'?'badge-fixed':'badge-flex'}
function stars(r){const f=Math.floor(r),h=r-f>=0.5?1:0;return'★'.repeat(f)+'½'.repeat(h)+'☆'.repeat(5-f-h)}
function gmapsUrl(name,lat,lng){return`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name+' Japan')}`}

function getFilteredSpots(){
  return state.spots.filter(s=>{
    if(state.mapFilter==='all')return true;
    if(state.mapFilter==='scheduled')return s.day!==null;
    if(state.mapFilter==='unscheduled')return s.day===null;
    return s.city===state.mapFilter;
  });
}

function buildLeafletMap(spots,activeId){
  const cityCenter={all:{lat:36.2,lng:137.5,zoom:5},tokyo:{lat:35.68,lng:139.75,zoom:12},kyoto:{lat:35.01,lng:135.76,zoom:12},hiroshima:{lat:34.39,lng:132.45,zoom:11},osaka:{lat:34.69,lng:135.50,zoom:12},scheduled:{lat:36.2,lng:137.5,zoom:5},unscheduled:{lat:36.2,lng:137.5,zoom:5}};
  const c=cityCenter[state.mapFilter]||cityCenter.all;
  const markers=spots.map(s=>{const d=SPOT_DATA[s.id];if(!d)return null;return{lat:d.lat,lng:d.lng,name:s.name,city:s.city,color:CITY_DOT[s.city]||'#888',id:s.id,day:s.day,active:s.id===activeId};}).filter(Boolean);
  return`<!DOCTYPE html><html><head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"><\/script>
  <style>
  html,body,#map{margin:0;padding:0;height:100%;width:100%;font-family:'DM Sans',sans-serif}
  .pin{width:32px;height:32px;border-radius:50%;border:2.5px solid white;box-shadow:0 2px 8px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:12px;cursor:pointer}
  .pin.active{width:40px;height:40px;border-width:3px;box-shadow:0 3px 14px rgba(0,0,0,.5);font-size:14px}
  .leaflet-popup-content-wrapper{border-radius:12px;font-family:'DM Sans',sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.15)}
  .leaflet-popup-content{margin:10px 14px}
  .pop-name{font-weight:600;font-size:13px;margin-bottom:2px}
  .pop-day{font-size:11px;padding:2px 8px;border-radius:10px;display:inline-block;margin-top:4px;color:white}
  </style></head><body><div id="map"></div>
  <script>
  var map=L.map('map',{zoomControl:true,scrollWheelZoom:true}).setView([${c.lat},${c.lng}],${c.zoom});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{attribution:'© OSM',maxZoom:19}).addTo(map);
  var ms=${JSON.stringify(markers)};
  var cityNames={tokyo:'Tokyo',kyoto:'Kyoto',hiroshima:'Hiroshima',osaka:'Osaka'};
  ms.forEach(function(m){
    var el=document.createElement('div');
    el.className='pin'+(m.active?' active':'');
    el.style.background=m.color;
    el.textContent=m.name[0];
    var icon=L.divIcon({className:'',html:el.outerHTML,iconSize:m.active?[40,40]:[32,32],iconAnchor:m.active?[20,40]:[16,32],popupAnchor:[0,m.active?-42:-34]});
    var dayStr=m.day!==null?'Day '+(m.day+1):'Unscheduled';
    L.marker([m.lat,m.lng],{icon:icon}).addTo(map)
      .bindPopup('<div class="pop-name">'+m.name+'</div><div class="pop-city">'+cityNames[m.city]+'</div><div class="pop-day" style="background:'+m.color+'">'+dayStr+'</div>');
    if(m.active){
      setTimeout(function(){map.setView([m.lat,m.lng],13);},100);
    }
  });
  <\/script></body></html>`;
}

function renderMapTab(){
  const filters=[{key:'all',label:'All'},{key:'tokyo',label:'Tokyo'},{key:'kyoto',label:'Kyoto'},{key:'hiroshima',label:'Hiroshima'},{key:'osaka',label:'Osaka'},{key:'scheduled',label:'✓ Scheduled'},{key:'unscheduled',label:'? Unscheduled'}];
  const filterHtml=filters.map(f=>{
    const isActive=state.mapFilter===f.key;
    const bg=CITY_DOT[f.key]||'#1a1a1a';
    return`<button class="filter-chip ${isActive?'active':''}" style="${isActive?`background:${bg};border-color:${bg}`:''}" onclick="A.setMapFilter('${f.key}')">
      ${CITY_DOT[f.key]?`<div class="fc-dot" style="background:${isActive?'rgba(255,255,255,0.7)':CITY_DOT[f.key]}"></div>`:''}${f.label}
    </button>`;
  }).join('');

  const filtered=getFilteredSpots();
  const cardsHtml=filtered.map(s=>{
    const d=SPOT_DATA[s.id];
    const dayStr=s.day!==null?`Day ${s.day+1} · ${fmtDateShort(getDate(s.day))}`:'Unscheduled';
    const isActive=state.activeSpotId===s.id;
    const starsHtml=d?`<span class="msc-stars">${stars(d.rating)}</span><span>${d.rating} (${d.ratingCount})</span>`:'';
    const imgHtml=d&&d.photo
      ?`<img class="map-spot-card-img" src="${d.photo}" alt="${s.name}" loading="lazy" onerror="this.style.display='none';this.nextSibling.style.display='flex'">`
      :'';
    const placeholderHtml=`<div class="map-spot-card-img-placeholder" ${d&&d.photo?'style="display:none"':''}>${CITY_EMOJI[s.city]||'📍'}</div>`;
    return`<div class="map-spot-card ${isActive?'active':''}" id="card-${s.id}" onclick="A.focusSpot(${s.id})">
      ${imgHtml}${placeholderHtml}
      <div class="map-spot-card-body">
        <div class="msc-name">${s.name}</div>
        <div class="msc-city-row">
          <div class="msc-dot" style="background:${CITY_DOT[s.city]}"></div>
          <span class="msc-city">${CITY_LABEL[s.city]}</span>
          <span class="msc-day" style="color:${CITY_DOT[s.city]}">${dayStr}</span>
        </div>
        ${d?`<div class="msc-rating">${starsHtml}</div>`:''}
        ${s.note?`<div style="font-size:11px;color:var(--ink3);margin-top:1px">💬 ${s.note}</div>`:''}
      </div>
      <div class="map-spot-card-arrow">›</div>
    </div>`;
  }).join('');

  return`<div class="map-tab-inner">
    <div class="map-filter-bar">${filterHtml}</div>
    <iframe id="map-iframe" src="about:blank" style="height:300px;width:100%;border:none;flex-shrink:0"></iframe>
    <div class="map-spot-list" id="map-spot-list">${cardsHtml||'<div style="padding:20px;font-size:13px;color:var(--ink3);text-align:center">No spots match this filter</div>'}</div>
  </div>`;
}

function injectMap(){
  const filtered=getFilteredSpots();
  const html=buildLeafletMap(filtered,state.activeSpotId);
  const iframe=document.getElementById('map-iframe');
  if(iframe)iframe.srcdoc=html;
}

function renderCalendar(){
  const unsched=state.spots.filter(s=>s.day===null);
  let h=`<div class="city-legend">`;
  ['tokyo','kyoto','hiroshima','osaka'].forEach(c=>{h+=`<div class="legend-chip"><div class="legend-dot" style="background:${CITY_DOT[c]}"></div>${CITY_LABEL[c]}</div>`;});
  h+=`</div>`;
  for(let i=0;i<14;i++){
    const cfg=DAYS_CONFIG[i],ss=getDaySpots(i),total=getDayTotal(i),pct=Math.min(100,Math.round((total/10)*100));
    h+=`<div class="day-card"><div class="day-card-header">
      <span class="day-num">${i+1}</span>
      <div class="day-city-dot" style="background:${CITY_DOT[cfg.city]}"></div>
      <span class="day-city-label" style="color:${CITY_DOT[cfg.city]}">${CITY_LABEL[cfg.city]}</span>
      <span class="day-date">${fmtDateShort(getDate(i))}</span>
      <button class="day-add-btn" onclick="A.openAdd('${cfg.city}',${i})">+</button>
    </div><div class="day-card-body">`;
    if(!ss.length){h+=`<div class="day-empty">No activities — tap + to add</div>`;}
    else{ss.forEach((s,idx)=>{
      const isLast=idx===ss.length-1,nextS=!isLast?ss[idx+1]:null,tk=nextS?transitKey(s,nextS):null,tkMins=nextS?getTransitMins(s.city,nextS.city,tk):0;
      h+=`<div class="tl-item"><div class="tl-spine"><div class="tl-dot-outer" style="background:${CITY_DOT[s.city]}"></div>${!isLast?`<div class="tl-connector" style="background:${CITY_DOT[s.city]};opacity:.2"></div>`:''}</div>
      <div class="tl-chip-area"><div class="activity-chip ${CHIP_CLASS[s.city]}" onclick="A.openMove(${s.id})">
        <span class="chip-name">${s.name}</span><span class="chip-dur">${s.duration}h</span>
        <div class="chip-actions">
          <a class="chip-map-btn" href="${gmapsUrl(s.name,SPOT_DATA[s.id]?.lat||35.68,SPOT_DATA[s.id]?.lng||139.75)}" target="_blank" onclick="event.stopPropagation()">
            <svg width="9" height="9" viewBox="0 0 16 16" fill="none"><path d="M8 1a5 5 0 100 10A5 5 0 008 1z" stroke="currentColor" stroke-width="1.5"/><path d="M8 11v4M6 13h4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>Map
          </a>
          <button class="chip-remove" onclick="event.stopPropagation();A.removeFromDay(${s.id})">×</button>
        </div>
      </div></div></div>`;
      if(!isLast&&nextS){h+=`<div class="transit-row"><div class="transit-spine"><div class="transit-line"></div></div><div style="display:flex;align-items:center;padding:2px 0"><button class="transit-btn" onclick="A.openTransitEdit('${tk}',${tkMins})">${transitLabel(tkMins)}</button></div></div>`;}
    });}
    h+=`<div class="hours-row"><div class="hours-track"><div class="hours-fill" style="width:${pct}%"></div></div><span class="hours-text">${total}h incl. transit</span></div></div></div>`;
  }
  h+=`<div style="margin-top:6px"><div class="section-title">Unscheduled <span class="count-badge">${unsched.length}</span></div>`;
  if(!unsched.length){h+=`<p style="font-size:13px;color:var(--ink3);font-style:italic">All spots are scheduled!</p>`;}
  else{unsched.forEach(s=>{h+=`<div class="unsched-item">
    <div class="unsched-dot" style="background:${CITY_DOT[s.city]}"></div>
    <span class="unsched-name">${s.name}</span><span class="unsched-dur">${s.duration}h</span>
    <span class="unsched-badge ${badgeClass(s.type)}">${typeLabel(s.type)}</span>
    <button class="assign-btn" onclick="A.openMove(${s.id})">Assign</button>
  </div>`;});}
  h+=`</div>`;return h;
}

    <div class="modal-header"><span class="modal-title">${isEdit?'Edit spot':'Add spot'}</span><button class="modal-close" onclick="A.closeModal()">×</button></div>
    <div class="modal-body">
      <div class="form-group"><label class="form-label">Activity name</label><input class="form-input" id="f-name" value="${f.name||''}" oninput="A.setForm('name',this.value)" placeholder="e.g. Shibuya Crossing" autocomplete="off"/></div>
      <div class="form-row-2">
        <div class="form-group"><label class="form-label">City</label><select class="form-select" onchange="A.setForm('city',this.value)"><option value="tokyo" ${f.city==='tokyo'?'selected':''}>Tokyo</option><option value="kyoto" ${f.city==='kyoto'?'selected':''}>Kyoto</option><option value="hiroshima" ${f.city==='hiroshima'?'selected':''}>Hiroshima</option><option value="osaka" ${f.city==='osaka'?'selected':''}>Osaka</option></select></div>
        <div class="form-group"><label class="form-label">Duration (hrs)</label><input class="form-input" type="number" min=".5" max="12" step=".5" value="${f.duration||2}" oninput="A.setForm('duration',+this.value)"/></div>
      </div>
      <div class="form-group"><label class="form-label">Type</label><select class="form-select" onchange="A.setForm('type',this.value)"><option value="flex" ${f.type==='flex'?'selected':''}>Flexible</option><option value="booked" ${f.type==='booked'?'selected':''}>Pre-booked</option><option value="fixed" ${f.type==='fixed'?'selected':''}>Fixed time</option></select></div>
      <div class="form-group"><label class="form-label">Notes</label><input class="form-input" value="${f.note||''}" oninput="A.setForm('note',this.value)" placeholder="Optional reminder or tip"/></div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="A.closeModal()">Cancel</button>
      ${isEdit?`<button class="btn-danger" onclick="A.deleteSpot(${state.modal.id})">Delete</button>`:''}
      <button class="btn-primary" onclick="A.saveSpot()">Save</button>
    </div>
  </div></div>`;
}

function renderMoveModal(){
  const s=state.spots.find(s=>s.id===state.moveId);if(!s)return'';
  let h=`<div class="modal-overlay" onclick="A.closeModal()"><div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header"><span class="modal-title">Move "${s.name}"</span><button class="modal-close" onclick="A.closeModal()">×</button></div>
    <div><div class="move-day-item" onclick="A.moveToDay(null)"><span class="move-day-name" style="color:var(--ink3)">Unscheduled</span><span class="move-day-meta">Remove from schedule</span></div>`;
  for(let i=0;i<14;i++){const cfg=DAYS_CONFIG[i],hrs=getDayTotal(i);h+=`<div class="move-day-item" onclick="A.moveToDay(${i})"><div class="legend-dot" style="background:${CITY_DOT[cfg.city]};flex-shrink:0"></div><span class="move-day-name">Day ${i+1} — ${CITY_LABEL[cfg.city]}</span><span class="move-day-meta">${fmtDateShort(getDate(i))} · ${hrs}h</span></div>`;}
  h+=`</div><div class="modal-actions"><button class="btn-secondary" onclick="A.closeModal()">Cancel</button><button class="btn-secondary" onclick="A.openEdit(${s.id})">Edit</button></div></div></div>`;
  return h;
}

function renderTransitModal(){
  const{key,val}=state.transitEdit;
  return`<div class="modal-overlay" onclick="A.closeModal()"><div class="modal-sheet" onclick="event.stopPropagation()">
    <div class="modal-handle"></div>
    <div class="modal-header"><span class="modal-title">Edit transit time</span><button class="modal-close" onclick="A.closeModal()">×</button></div>
    <div class="modal-body">
      <p class="transit-hint">Typical Tokyo subway: 15–45 min. Shinkansen inter-city: 60–200 min.</p>
      <div class="transit-presets">${[10,20,30,45,60,90,120].map(p=>`<button class="preset-btn" onclick="A.setTransitVal(${p})">${transitLabel(p)}</button>`).join('')}</div>
      <div class="form-group"><label class="form-label">Custom (minutes)</label><input class="form-input" type="number" min="5" max="300" step="5" id="t-val" value="${val}" oninput="A.setTransitVal(+this.value)"/></div>
    </div>
    <div class="modal-actions"><button class="btn-secondary" onclick="A.closeModal()">Cancel</button><button class="btn-primary" onclick="A.saveTransit()">Save</button></div>
  </div></div>`;
}

const A={
  setTab(t){state.activeTab=t;state.activeSpotId=null;renderApp()},
  setForm(k,v){state.form[k]=v},
  setTransitVal(v){if(state.transitEdit){state.transitEdit.val=v;const el=document.getElementById('t-val');if(el)el.value=v;}},
  setMapFilter(f){state.mapFilter=f;state.activeSpotId=null;renderApp()},
  focusSpot(id){
    state.activeSpotId=id;
    // re-inject map with new active spot, scroll card into view
    const filtered=getFilteredSpots();
    const html=buildLeafletMap(filtered,id);
    const iframe=document.getElementById('map-iframe');
    if(iframe)iframe.srcdoc=html;
    // highlight card
    document.querySelectorAll('.map-spot-card').forEach(el=>{el.classList.remove('active');});
    const card=document.getElementById('card-'+id);
    if(card){card.classList.add('active');card.scrollIntoView({behavior:'smooth',block:'nearest'});}
  },
  openAdd(city,day){
    state.form={name:'',city:city||'tokyo',duration:2,type:'flex',note:''};
    state.modal={mode:'add',prefillDay:day??null};renderApp();
    setTimeout(()=>{const el=document.getElementById('f-name');if(el)el.focus()},100);
  },
  openEdit(id){const s=state.spots.find(s=>s.id===id);if(!s)return;state.form={name:s.name,city:s.city,duration:s.duration,type:s.type,note:s.note||''};state.modal={mode:'edit',id};state.moveId=null;renderApp();},
  openMove(id){state.moveId=id;state.modal=null;renderApp()},
  openTransitEdit(key,val){state.transitEdit={key,val};renderApp()},
  saveSpot(){
    const f=state.form;if(!f.name||!f.name.trim())return;
    if(state.modal.mode==='edit'){const s=state.spots.find(s=>s.id===state.modal.id);Object.assign(s,{name:f.name.trim(),city:f.city,duration:+f.duration,type:f.type,note:f.note});}
    else{const ord=state.modal.prefillDay!==null?getDaySpots(state.modal.prefillDay).length:0;state.spots.push({id:state.nextId++,name:f.name.trim(),city:f.city,duration:+f.duration,type:f.type,note:f.note,day:state.modal.prefillDay,order:ord});}
    state.modal=null;saveState();renderApp();
  },
  deleteSpot(id){state.spots=state.spots.filter(s=>s.id!==id);state.modal=null;saveState();renderApp()},
  removeFromDay(id){const s=state.spots.find(s=>s.id===id);if(s)s.day=null;saveState();renderApp()},
  moveToDay(dayIdx){const s=state.spots.find(s=>s.id===state.moveId);if(s){s.day=dayIdx;if(dayIdx!==null)s.order=getDaySpots(dayIdx).length;}state.moveId=null;saveState();renderApp()},
  saveTransit(){if(state.transitEdit){state.transit[state.transitEdit.key]=+state.transitEdit.val;state.transitEdit=null;saveState();renderApp();}},
  closeModal(){state.modal=null;state.moveId=null;state.transitEdit=null;renderApp()}
};

loadState();renderApp();
</script>
</body>
</html>
