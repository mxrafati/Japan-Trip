<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Japan Trip 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--red-light:#FDECEA;--red-mid:#E8A09A;
  --ink:#1A1A2E;--ink2:#3D3D5C;--muted:#7B7B9A;
  --surface:#F9F7F4;--card:#FFFFFF;--border:#E8E4DF;
  --tokyo:#2563EB;--tokyo-light:#EFF6FF;
  --osaka:#059669;--osaka-light:#ECFDF5;
  --park:#D97706;--park-light:#FFFBEB;
  --transit:#6B7280;--transit-light:#F9FAFB;
  --night:#7C3AED;--night-light:#F5F3FF;
  --shop:#DB2777;--shop-light:#FDF2F8;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);min-height:100vh;display:flex;flex-direction:column;}

.app-header{background:var(--ink);color:white;padding:14px 20px 10px;position:sticky;top:0;z-index:100;}
.app-header h1{font-family:'Noto Serif JP',serif;font-size:17px;font-weight:600;letter-spacing:.5px;}
.app-header p{font-size:11px;color:rgba(255,255,255,.5);margin-top:2px;}

.toolbar{padding:10px 16px;background:var(--card);border-bottom:1px solid var(--border);display:flex;gap:8px;position:sticky;top:52px;z-index:90;}
.toolbar input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface);outline:none;color:var(--ink);}
.add-btn{padding:9px 16px;background:var(--red);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;}

.drag-hint{padding:7px 16px;font-size:11px;color:var(--muted);background:var(--surface);border-bottom:1px solid var(--border);text-align:center;letter-spacing:.2px;}

/* Day section */
.day-section{margin-bottom:2px;}
.day-heading{padding:9px 16px 6px;display:flex;align-items:center;gap:10px;position:sticky;top:104px;z-index:80;background:var(--surface);}
.day-badge{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;flex-shrink:0;}
.day-badge.tokyo{background:var(--tokyo-light);color:var(--tokyo);}
.day-badge.osaka{background:var(--osaka-light);color:var(--osaka);}
.day-badge.park{background:var(--park-light);color:var(--park);}
.day-badge.transit{background:var(--transit-light);color:var(--transit);}
.day-heading-text{flex:1;}
.day-heading-date{font-size:14px;font-weight:600;color:var(--ink);}
.day-spot-count{font-size:11px;color:var(--muted);flex-shrink:0;}

/* Drop zone */
.drop-zone{min-height:52px;padding:4px 12px 8px;border-bottom:2px solid var(--border);}
.drop-zone.drag-over{background:rgba(37,99,235,.06);border-bottom-color:var(--tokyo);}
.drop-zone.osaka-zone.drag-over{background:rgba(5,150,105,.06);border-bottom-color:var(--osaka);}
.drop-zone-empty{font-size:12px;color:var(--muted);font-style:italic;padding:10px 4px;text-align:center;border:1.5px dashed var(--border);border-radius:8px;margin:4px 0;}

/* Unassigned section */
.unassigned-heading{padding:12px 16px 6px;display:flex;align-items:center;gap:8px;}
.unassigned-heading span{font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.unassigned-zone{min-height:60px;padding:4px 12px 12px;border-bottom:2px solid var(--border);}
.unassigned-zone.drag-over{background:var(--red-light);border-bottom-color:var(--red);}

/* Spot row */
.spot-row{display:flex;align-items:center;gap:10px;padding:9px 10px;background:var(--card);border-radius:10px;margin:4px 0;border:1px solid var(--border);cursor:pointer;transition:box-shadow .15s;user-select:none;touch-action:none;}
.spot-row:active{box-shadow:0 2px 10px rgba(0,0,0,.1);}
.spot-row.dragging{opacity:.4;}
.drag-handle{color:var(--muted);font-size:16px;cursor:grab;flex-shrink:0;padding:0 2px;}
.spot-color-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.spot-color-dot.tokyo{background:var(--tokyo);}
.spot-color-dot.osaka,.spot-color-dot.kyoto,.spot-color-dot.nara{background:var(--osaka);}
.spot-row-body{flex:1;min-width:0;}
.spot-row-name{font-size:13px;font-weight:500;color:var(--ink);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.spot-row-meta{font-size:11px;color:var(--muted);margin-top:1px;}
.spot-row-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}
.spot-rating-pill{font-size:11px;font-weight:500;color:var(--park);}
.spot-chevron{color:var(--muted);font-size:14px;}

/* Detail panel (slide down) */
.spot-detail{display:none;padding:10px 12px 12px;background:#FAFAF8;border-radius:0 0 10px 10px;margin-top:-4px;border:1px solid var(--border);border-top:none;margin-bottom:4px;}
.spot-detail.open{display:block;}
.detail-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;}
.detail-icon{font-size:13px;flex-shrink:0;margin-top:1px;width:16px;text-align:center;}
.detail-value{font-size:13px;color:var(--ink2);line-height:1.5;flex:1;}
.detail-link{font-size:13px;color:var(--tokyo);text-decoration:none;}
.detail-actions{display:flex;gap:8px;margin-top:10px;}
.day-select{width:100%;margin-top:6px;padding:8px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);outline:none;}
.save-day-btn{margin-top:8px;width:100%;padding:9px;background:var(--ink);color:white;border:none;border-radius:8px;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;}
.save-day-btn:active{opacity:.8;}
.detail-btn{padding:7px 14px;border-radius:7px;font-size:12px;font-family:'DM Sans',sans-serif;cursor:pointer;font-weight:500;}
.detail-btn.edit{background:var(--surface);border:1px solid var(--border);color:var(--ink2);}
.detail-btn.delete{background:var(--red-light);border:1px solid var(--red-mid);color:var(--red);}

/* Modal */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;align-items:flex-end;}
.modal-overlay.open{display:flex;}
.modal{background:var(--card);border-radius:20px 20px 0 0;padding:20px;width:100%;max-height:88vh;overflow-y:auto;padding-bottom:calc(20px + env(safe-area-inset-bottom));}
.modal h3{font-size:16px;font-weight:600;margin-bottom:16px;}
.modal label{display:block;font-size:12px;font-weight:500;color:var(--muted);margin-bottom:4px;margin-top:12px;}
.modal input,.modal textarea,.modal select{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:'DM Sans',sans-serif;background:var(--surface);color:var(--ink);outline:none;}
.modal textarea{min-height:70px;resize:vertical;}
.modal-btns{display:flex;gap:10px;margin-top:20px;}
.btn-save{flex:1;padding:12px;background:var(--ink);color:white;border:none;border-radius:10px;font-size:14px;font-weight:500;font-family:'DM Sans',sans-serif;cursor:pointer;}
.btn-cancel{padding:12px 20px;border:1px solid var(--border);border-radius:10px;font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;background:none;color:var(--ink2);}

/* Drag ghost */
#dragGhost{position:fixed;pointer-events:none;z-index:999;opacity:.9;transform:scale(1.03);box-shadow:0 4px 16px rgba(0,0,0,.18);border-radius:10px;background:white;}
.main-scroll{flex:1;overflow-y:auto;padding-bottom:30px;}
</style>
</head>
<body>

<div class="app-header">
  <h1>Japan Trip 2026 ✦</h1>
  <p>May 21 – June 5 &nbsp;·&nbsp; Tokyo &amp; Osaka &nbsp;·&nbsp; Family of 4</p>
</div>

<div class="toolbar">
  <input type="text" id="spotSearch" placeholder="Search spots..." oninput="render()">
  <button class="add-btn" onclick="openAddSpot()">+ Add spot</button>
</div>
<div class="drag-hint">Drag ⠿ handle to move a spot to another day — tap to expand details</div>

<div class="main-scroll" id="board"></div>

<!-- Spot Modal -->
<div class="modal-overlay" id="spotModal">
  <div class="modal">
    <h3 id="spotModalTitle">Add spot</h3>
    <label>Name</label><input type="text" id="sName" placeholder="e.g. Fushimi Inari Shrine">
    <label>City</label>
    <select id="sCity">
      <option value="tokyo">Tokyo</option>
      <option value="osaka">Osaka</option>
      <option value="kyoto">Kyoto</option>
      <option value="nara">Nara</option>
    </select>
    <label>Duration needed</label><input type="text" id="sDuration" placeholder="e.g. 2–3 hours">
    <label>Google rating (1–5)</label><input type="number" id="sRating" min="1" max="5" step="0.1" placeholder="e.g. 4.6">
    <label>Google Maps URL (optional)</label><input type="url" id="sUrl" placeholder="https://maps.google.com/...">
    <label>Notes</label><textarea id="sNotes" placeholder="Tips, booking info, opening hours..."></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save" onclick="saveSpot()">Save</button>
    </div>
  </div>
</div>

<div class="modal-overlay" id="deleteConfirm">
  <div class="modal" style="max-height:auto;">
    <h3>Delete spot?</h3>
    <p style="font-size:14px;color:var(--ink2);margin-top:8px;line-height:1.5;">This spot will be permanently removed from your trip.</p>
    <div class="modal-btns" style="margin-top:20px;">
      <button class="btn-cancel" onclick="cancelDelete()">Cancel</button>
      <button class="btn-save" style="background:var(--red);" onclick="confirmDelete()">Delete</button>
    </div>
  </div>
</div>

<div id="dragGhost" style="display:none;width:280px;padding:9px 12px;"></div>

<script>
const SK = 'japan2026_v5';

const DAYS = [
  {id:1,date:'May 21',dow:'Thu',type:'tokyo',title:'Arrival – Asakusa'},
  {id:2,date:'May 22',dow:'Fri',type:'tokyo',title:'Senso-ji + Ueno + Ameyoko'},
  {id:3,date:'May 23',dow:'Sat',type:'tokyo',title:'TeamLab Planets + Odaiba'},
  {id:4,date:'May 24',dow:'Sun',type:'tokyo',title:'Shibuya Crossing + Shibuya Sky'},
  {id:5,date:'May 25',dow:'Mon',type:'tokyo',title:'Studio Ghibli Museum'},
  {id:6,date:'May 26',dow:'Tue',type:'park',title:'Tokyo Disneyland — Full Day'},
  {id:7,date:'May 27',dow:'Wed',type:'tokyo',title:'Shinjuku Gyoen + Nightlife'},
  {id:8,date:'May 28',dow:'Thu',type:'tokyo',title:'Meiji Shrine + Harajuku + Akihabara'},
  {id:9,date:'May 29',dow:'Fri',type:'tokyo',title:'Sumida Park + Shopping Day'},
  {id:10,date:'May 30',dow:'Sat',type:'transit',title:'Depart Tokyo → Osaka'},
  {id:11,date:'May 31',dow:'Sun',type:'osaka',title:'Arrive Osaka + Dotonbori'},
  {id:12,date:'Jun 1',dow:'Mon',type:'osaka',title:'Osaka Castle + Kuromon Market'},
  {id:13,date:'Jun 2',dow:'Tue',type:'park',title:'Universal Studios Japan — Full Day'},
  {id:14,date:'Jun 3',dow:'Wed',type:'osaka',title:'Day Trip: Kyoto'},
  {id:15,date:'Jun 4',dow:'Thu',type:'osaka',title:'Day Trip: Nara'},
  {id:16,date:'Jun 5',dow:'Fri',type:'transit',title:'Departure — Fly Home'},
];

const DEFAULT_SPOTS = [
  {id:'s1',name:'Senso-ji Temple',city:'tokyo',dayId:2,duration:'2–3 hours',rating:4.7,url:'https://maps.google.com/?q=Senso-ji+Temple+Tokyo',notes:'Arrive by 8am to beat crowds. Free entry.'},
  {id:'s2',name:'TeamLab Planets',city:'tokyo',dayId:3,duration:'2–3 hours',rating:4.6,url:'https://maps.google.com/?q=TeamLab+Planets+Tokyo',notes:'Pre-booking required. ¥3,200/adult.'},
  {id:'s3',name:'Shibuya Crossing',city:'tokyo',dayId:4,duration:'1 hour',rating:4.6,url:'https://maps.google.com/?q=Shibuya+Crossing+Tokyo',notes:'Best Sunday morning. View from Starbucks 2F.'},
  {id:'s4',name:'Shibuya Sky',city:'tokyo',dayId:4,duration:'1.5 hours',rating:4.5,url:'https://maps.google.com/?q=Shibuya+Sky+observation+deck',notes:'Book online in advance. ¥2,000/adult.'},
  {id:'s5',name:'Studio Ghibli Museum',city:'tokyo',dayId:5,duration:'3 hours',rating:4.7,url:'https://maps.google.com/?q=Ghibli+Museum+Mitaka',notes:'BOOKING REQUIRED: l-tike.com on Apr 10 at 6pm Vancouver time.'},
  {id:'s6',name:'Inokashira Park',city:'tokyo',dayId:5,duration:'2 hours',rating:4.5,url:'https://maps.google.com/?q=Inokashira+Park+Kichijoji',notes:'Rowboats ¥700/30 min. Next to Ghibli Museum.'},
  {id:'s7',name:'Tokyo Disneyland',city:'tokyo',dayId:6,duration:'Full day',rating:4.7,url:'https://maps.google.com/?q=Tokyo+Disneyland',notes:'Book at tokyodisneyresort.jp. Tuesdays quietest.'},
  {id:'s8',name:'Shinjuku Gyoen',city:'tokyo',dayId:7,duration:'2 hours',rating:4.6,url:'https://maps.google.com/?q=Shinjuku+Gyoen+National+Garden',notes:'¥500/adult. Beautiful in late May.'},
  {id:'s9',name:'Meiji Shrine',city:'tokyo',dayId:8,duration:'1.5 hours',rating:4.6,url:'https://maps.google.com/?q=Meiji+Shrine+Tokyo',notes:'Free entry. Arrive early for peaceful atmosphere.'},
  {id:'s10',name:'Harajuku Takeshita Street',city:'tokyo',dayId:8,duration:'1.5 hours',rating:4.3,url:'https://maps.google.com/?q=Takeshita+Street+Harajuku',notes:'Kids love the crepes and candy floss.'},
  {id:'s11',name:'Akihabara',city:'tokyo',dayId:8,duration:'2 hours',rating:4.4,url:'https://maps.google.com/?q=Akihabara+Tokyo',notes:'Pokemon Center, arcades, Gachapon machines.'},
  {id:'s12',name:'Dotonbori',city:'osaka',dayId:11,duration:'2–3 hours',rating:4.4,url:'https://maps.google.com/?q=Dotonbori+Osaka',notes:'Best at night. Try takoyaki ¥500–700.'},
  {id:'s13',name:'Osaka Castle',city:'osaka',dayId:12,duration:'2–3 hours',rating:4.4,url:'https://maps.google.com/?q=Osaka+Castle',notes:'Grounds free. Tower museum ¥600/adult.'},
  {id:'s14',name:'Kuromon Ichiba Market',city:'osaka',dayId:12,duration:'1.5 hours',rating:4.2,url:'https://maps.google.com/?q=Kuromon+Ichiba+Market+Osaka',notes:'170+ stalls. Fresh seafood & street food.'},
  {id:'s15',name:'Universal Studios Japan',city:'osaka',dayId:13,duration:'Full day',rating:4.5,url:'https://maps.google.com/?q=Universal+Studios+Japan+Osaka',notes:'Book at usj.co.jp. Super Nintendo World needs separate ticket.'},
  {id:'s16',name:'Fushimi Inari Shrine',city:'kyoto',dayId:14,duration:'2 hours',rating:4.7,url:'https://maps.google.com/?q=Fushimi+Inari+Shrine+Kyoto',notes:'Free entry. Arrive before 8am to beat crowds.'},
  {id:'s17',name:'Arashiyama Bamboo Grove',city:'kyoto',dayId:14,duration:'1 hour',rating:4.4,url:'https://maps.google.com/?q=Arashiyama+Bamboo+Grove+Kyoto',notes:'Free entry. Go early morning for best experience.'},
  {id:'s18',name:'Kinkaku-ji Golden Pavilion',city:'kyoto',dayId:14,duration:'1 hour',rating:4.5,url:'https://maps.google.com/?q=Kinkakuji+Temple+Kyoto',notes:'¥500/adult. One of Japan\'s most iconic sights.'},
  {id:'s19',name:'Todai-ji Temple + Nara Park',city:'nara',dayId:15,duration:'2–3 hours',rating:4.6,url:'https://maps.google.com/?q=Todaiji+Temple+Nara',notes:'¥600/adult. Deer crackers ¥200. Kids will love it.'}
];

let spots = loadSpots();
let openDetailId = null;

function loadSpots(){
  try{const s=localStorage.getItem(SK);if(s)return JSON.parse(s);}catch(e){}
  return JSON.parse(JSON.stringify(DEFAULT_SPOTS));
}
function save(){try{localStorage.setItem(SK,JSON.stringify(spots));}catch(e){}}

// ── RENDER ──
function render(){
  const q = (document.getElementById('spotSearch').value||'').toLowerCase();
  const board = document.getElementById('board');
  let html = '';

  DAYS.forEach(d => {
    const daySpots = spots.filter(s => s.dayId === d.id && (!q || s.name.toLowerCase().includes(q)));
    const isOsaka = d.type === 'osaka' || d.type === 'park' && d.id >= 11;
    const zoneClass = 'drop-zone' + (isOsaka ? ' osaka-zone' : '');
    html += '<div class="day-section">' +
      '<div class="day-heading">' +
        '<div class="day-badge ' + d.type + '">D' + d.id + '</div>' +
        '<div class="day-heading-text">' +
          '<div class="day-heading-date">' + d.date + ' &nbsp;<span style="color:var(--muted);font-weight:400;font-size:13px;">— ' + d.dow + '</span></div>' +
        '</div>' +
        '<div class="day-spot-count">' + (daySpots.length ? daySpots.length + ' spot' + (daySpots.length>1?'s':'') : '') + '</div>' +
      '</div>' +
      '<div class="' + zoneClass + '" id="zone-' + d.id + '" ' +
        'ondragover="onDragOver(event,' + d.id + ')" ' +
        'ondrop="onDrop(event,' + d.id + ')" ' +
        'ondragleave="onDragLeave(event)">' +
      (daySpots.length
        ? daySpots.map(s => spotRowHtml(s, d)).join('')
        : '<div class="drop-zone-empty">Drop spots here</div>'
      ) +
      '</div>' +
    '</div>';
  });

  // Unassigned
  const unassigned = spots.filter(s => !s.dayId && (!q || s.name.toLowerCase().includes(q)));
  html += '<div class="unassigned-heading"><span>Unassigned spots</span></div>' +
    '<div class="unassigned-zone" id="zone-null" ' +
      'ondragover="onDragOver(event,null)" ' +
      'ondrop="onDrop(event,null)" ' +
      'ondragleave="onDragLeave(event)">' +
    (unassigned.length
      ? unassigned.map(s => spotRowHtml(s, null)).join('')
      : '<div class="drop-zone-empty">All spots assigned</div>'
    ) +
    '</div>';

  board.innerHTML = html;
  initTouch();
}

function spotRowHtml(s, d) {
  const isOpen = openDetailId === s.id;
  const dotClass = (s.city==='kyoto'||s.city==='nara') ? 'osaka' : s.city;
  const dayLabel = d ? d.date + ' — ' + d.dow + ' (Day ' + d.id + ')' : 'Unassigned';

  const detail = isOpen ? '<div class="spot-detail open" id="detail-' + s.id + '">' +
    (s.rating ? '<div class="detail-row"><div class="detail-icon">★</div><div class="detail-value"><strong>Rating:</strong> ' + s.rating + ' / 5</div></div>' : '') +
    '<div class="detail-row"><div class="detail-icon">📅</div><div class="detail-value"><strong>Date:</strong> ' + dayLabel + '</div></div>' +
    (s.duration ? '<div class="detail-row"><div class="detail-icon">⏱</div><div class="detail-value"><strong>Duration:</strong> ' + s.duration + '</div></div>' : '') +
    '<div class="detail-row"><div class="detail-icon">🏙</div><div class="detail-value"><strong>City:</strong> ' + s.city.charAt(0).toUpperCase() + s.city.slice(1) + '</div></div>' +
    '<div class="detail-row"><div class="detail-icon">📅</div><div class="detail-value">' +
      '<strong>Assign to day:</strong><br>' +
      '<select class="day-select" id="sel-' + s.id + '" onclick="event.stopPropagation()">' +
        '<option value="">— Unassigned —</option>' +
        DAYS.map(function(d){ return '<option value="' + d.id + '"' + (s.dayId===d.id?' selected':'') + '>' + d.date + ' — ' + d.dow + ' (Day ' + d.id + ')</option>'; }).join('') +
      '</select>' +
      '<button class="save-day-btn" onclick="event.stopPropagation();saveAssign(this)" data-sid="' + s.id + '">Save date</button>' +
    '</div></div>' +
    (s.notes ? '<div class="detail-row"><div class="detail-icon">📝</div><div class="detail-value">' + s.notes + '</div></div>' : '') +
    (s.url ? '<div class="detail-row"><div class="detail-icon">📍</div><div class="detail-value"><a href="' + s.url + '" target="_blank" class="detail-link">Open in Google Maps →</a></div></div>' : '') +
    '<div class="detail-actions">' +
      '<button class="detail-btn edit" onclick="event.stopPropagation();openEditSpot(\'' + s.id + '\')">✎ Edit</button>' +
      '<button class="detail-btn delete" onclick="event.stopPropagation();deleteSpot(\'' + s.id + '\')">Delete</button>' +
    '</div>' +
  '</div>' : '<div class="spot-detail" id="detail-' + s.id + '"></div>';

  return '<div class="spot-row" id="row-' + s.id + '" ' +
    'draggable="true" ' +
    'ondragstart="onDragStart(event,\'' + s.id + '\')" ' +
    'ondragend="onDragEnd(event)">' +
    '<div class="drag-handle" onclick="event.stopPropagation()">⠿</div>' +
    '<div class="spot-color-dot ' + dotClass + '"></div>' +
    '<div class="spot-row-body" onclick="toggleDetail(\'' + s.id + '\')">' +
      '<div class="spot-row-name">' + s.name + '</div>' +
      '<div class="spot-row-meta">' + s.city.charAt(0).toUpperCase() + s.city.slice(1) + (s.duration ? ' · ' + s.duration : '') + '</div>' +
    '</div>' +
    '<div class="spot-row-right">' +
      (s.rating ? '<span class="spot-rating-pill">★' + s.rating + '</span>' : '') +
      '<span class="spot-chevron">' + (isOpen ? '▾' : '›') + '</span>' +
    '</div>' +
  '</div>' + detail;
}

function toggleDetail(id){
  openDetailId = (openDetailId === id) ? null : id;
  render();
  // scroll to keep row in view
  setTimeout(() => {
    const el = document.getElementById('row-' + id);
    if(el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
  }, 50);
}

// ── MOUSE DRAG ──
let draggingId = null;
function onDragStart(e, id){
  draggingId = id;
  e.dataTransfer.effectAllowed = 'move';
  setTimeout(() => { const el = document.getElementById('row-' + id); if(el) el.classList.add('dragging'); }, 0);
}
function onDragEnd(e){
  if(draggingId){ const el = document.getElementById('row-' + draggingId); if(el) el.classList.remove('dragging'); }
  draggingId = null;
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
}
function onDragOver(e, dayId){ e.preventDefault(); e.currentTarget.classList.add('drag-over'); }
function onDragLeave(e){ e.currentTarget.classList.remove('drag-over'); }
function onDrop(e, dayId){
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if(!draggingId) return;
  assign(draggingId, dayId);
}

// ── TOUCH DRAG (iPhone) ──
let touchId = null, touchGhost = null, lastOver = null;
function initTouch(){
  document.querySelectorAll('.drag-handle').forEach(handle => {
    handle.addEventListener('touchstart', ts, {passive:false});
    handle.addEventListener('touchmove', tm, {passive:false});
    handle.addEventListener('touchend', te, {passive:false});
  });
}
function ts(e){
  const row = e.currentTarget.closest('.spot-row');
  touchId = row.id.replace('row-','');
  const rect = row.getBoundingClientRect();
  touchGhost = document.getElementById('dragGhost');
  touchGhost.textContent = row.querySelector('.spot-row-name').textContent;
  touchGhost.style.display = 'block';
  touchGhost.style.top = rect.top + 'px';
  touchGhost.style.left = rect.left + 'px';
  row.classList.add('dragging');
  e.preventDefault();
}
function tm(e){
  if(!touchId) return;
  e.preventDefault();
  const t = e.touches[0];
  touchGhost.style.top = (t.clientY - 22) + 'px';
  touchGhost.style.left = (t.clientX - 30) + 'px';
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el && (el.classList.contains('drop-zone') || el.classList.contains('unassigned-zone'))
    ? el : el && el.closest('.drop-zone, .unassigned-zone');
  if(lastOver && lastOver !== zone) lastOver.classList.remove('drag-over');
  if(zone){ zone.classList.add('drag-over'); lastOver = zone; }
}
function te(e){
  if(!touchId) return;
  const t = e.changedTouches[0];
  document.getElementById('dragGhost').style.display = 'none';
  document.querySelectorAll('.drag-over').forEach(el => el.classList.remove('drag-over'));
  const el = document.elementFromPoint(t.clientX, t.clientY);
  const zone = el && (el.classList.contains('drop-zone') || el.classList.contains('unassigned-zone'))
    ? el : el && el.closest('.drop-zone, .unassigned-zone');
  if(zone){
    const zid = zone.id.replace('zone-','');
    assign(touchId, zid === 'null' ? null : parseInt(zid));
  }
  const row = document.getElementById('row-' + touchId);
  if(row) row.classList.remove('dragging');
  touchId = null; lastOver = null;
}

function assign(spotId, dayId){
  const s = spots.find(x => x.id === spotId);
  if(!s) return;
  s.dayId = dayId || null;
  save();
  render();
}

// ── ADD / EDIT ──
let editingId = null;
function openAddSpot(){
  editingId = null;
  document.getElementById('spotModalTitle').textContent = 'Add spot';
  ['sName','sDuration','sRating','sUrl','sNotes'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('sCity').value = 'tokyo';
  document.getElementById('spotModal').classList.add('open');
}
function openEditSpot(id){
  editingId = id;
  const s = spots.find(x => x.id === id);
  document.getElementById('spotModalTitle').textContent = 'Edit spot';
  document.getElementById('sName').value = s.name || '';
  document.getElementById('sCity').value = s.city || 'tokyo';
  document.getElementById('sDuration').value = s.duration || '';
  document.getElementById('sRating').value = s.rating || '';
  document.getElementById('sUrl').value = s.url || '';
  document.getElementById('sNotes').value = s.notes || '';
  document.getElementById('spotModal').classList.add('open');
}
function closeModal(){ document.getElementById('spotModal').classList.remove('open'); editingId = null; }
function saveSpot(){
  const data = {
    name: document.getElementById('sName').value,
    city: document.getElementById('sCity').value,
    duration: document.getElementById('sDuration').value,
    rating: parseFloat(document.getElementById('sRating').value) || null,
    url: document.getElementById('sUrl').value,
    notes: document.getElementById('sNotes').value,
  };
  if(!data.name.trim()) return;
  if(editingId){
    Object.assign(spots.find(x => x.id === editingId), data);
  } else {
    data.id = 's' + Date.now();
    data.dayId = null;
    spots.push(data);
  }
  save(); closeModal(); render();
}
function deleteSpot(id){
  pendingDeleteId = id;
  document.getElementById('deleteConfirm').classList.add('open');
}
let pendingDeleteId = null;
function confirmDelete(){
  if(pendingDeleteId){
    spots = spots.filter(s => s.id !== pendingDeleteId);
    if(openDetailId === pendingDeleteId) openDetailId = null;
    pendingDeleteId = null;
    save(); render();
  }
  document.getElementById('deleteConfirm').classList.remove('open');
}
function cancelDelete(){
  pendingDeleteId = null;
  document.getElementById('deleteConfirm').classList.remove('open');
}

function saveAssign(btn){
  const spotId = btn.getAttribute('data-sid');
  const sel = document.getElementById('sel-' + spotId);
  if(!sel) return;
  const val = sel.value;
  assign(spotId, val === '' ? null : parseInt(val));
}

render();
</script>
